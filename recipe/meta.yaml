{% set name = "azure-mgmt-redis" %}
{% set version = "14.5.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_')}}-{{ version }}.tar.gz
  sha256: 5c3434c82492688e25b93aaf5113ecff0b92b7ad6da2a4fd4695530f82b152fa

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip: true  # [py<38]

requirements:
  host:
    - python
    - pip
    - setuptools
    - wheel
  run:
    - python
    - isodate>=0.6.1
    - typing-extensions >=4.6.0
    - azure-common >=1.1
    - azure-mgmt-core >=1.3.2

test:
  imports:
    - azure.mgmt.redis
  commands:
    - pip check
  requires:
    - pip

about:
  home:  https://github.com/Azure/azure-sdk-for-python
  summary: Microsoft Azure Management Redis Library for Python.
  license: MIT
  license_family: MIT
  license_file: LICENSE.txt
  description: Microsoft Azure Management Redis Library for Python.
  dev_url: https://github.com/Azure/azure-sdk-for-python
  doc_url: https://github.com/Azure/azure-sdk-for-python

extra:
  recipe-maintainers:
    - tim-werner
